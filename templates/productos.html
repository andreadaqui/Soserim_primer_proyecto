{% extends "base.html" %}

{% block content %}

<h2>Agregar Producto</h2>

<form action="/agregar" method="post">
    <input type="number" name="id" placeholder="ID" required>
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="number" name="cantidad" placeholder="Cantidad" required>
    <input type="number" step="0.01" name="precio" placeholder="Precio" required>
    <button type="submit">Agregar</button>
</form>

<hr>

<h2>Buscar Producto</h2>
<form action="/buscar" method="get">
    <input type="text" name="nombre" placeholder="Buscar por nombre">
    <button type="submit">Buscar</button>
</form>

<hr>

<h2>Inventario</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Acción</th>
    </tr>

    {% for p in productos %}
    <tr>
        <td>{{ p.get_id() }}</td>
        <td>{{ p.get_nombre() }}</td>
        <td>{{ p.get_cantidad() }}</td>
        <td>{{ p.get_precio() }}</td>
        <td>
            <!-- FORMULARIO PARA ACTUALIZAR -->
            <form action="/actualizar/{{ p.get_id() }}" method="post" style="display:inline;">
                <input type="number" name="cantidad" placeholder="Nueva Cantidad" required>
                <input type="number" step="0.01" name="precio" placeholder="Nuevo Precio" required>
                <button type="submit">Actualizar</button>
            </form>

            <!-- BOTÓN ELIMINAR -->
            <a href="/eliminar/{{ p.get_id() }}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
