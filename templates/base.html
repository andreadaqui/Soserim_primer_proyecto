<!DOCTYPE html>
<html>
<head>
    <title>Sosermin</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 40px;
        }

        h1{
            color: #1a3c6e;
        }

        nav a{
            text-decoration: none;
            margin-right: 15px;
            color: #1a3c6e;
            font-weight: bold;
        }

        nav a:hover{
            color: #0a7cff;
        }

        table{
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th{
            background-color: #1a3c6e;
            color: white;
            padding: 10px;
        }

        td{
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        input{
            padding: 5px;
            margin: 3px;
        }

        button{
            background-color: #0a7cff;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
        }

        button:hover{
            background-color: #095ec0;
        }

    </style>

</head>
<body style="background-color: white; color: black;">

<h1>Sosermin - Sistema de Gestión</h1>

<nav>
<a href="/">Inicio</a> |
<a href="/about">Acerca de</a> |
<a href="/datos">Ver Datos</a>
</nav>

<hr>

{% block content %}
{% endblock %}

<hr>
<footer>
    Proyecto Flask - Semana 10
</footer>

</body>
</html>
